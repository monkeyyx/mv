<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFlixi | API Ultra-Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card: rgba(255, 255, 255, 0.03);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Outfit', sans-serif; 
            padding: 40px; 
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-container {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #1a1a1e;
        }

        .content { padding: 20px; }
        .meta { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-dim); }
        .rating { color: #fbbf24; font-weight: 600; }
        .title { font-size: 1.25rem; font-weight: 600; margin-bottom: 15px; height: 3rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .btn-resolve {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-resolve:hover { background: var(--accent); border-color: var(--accent); }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
        }
        .badge-hls { background: #10b981; color: #fff; }
        .badge-missing { background: #ef4444; color: #fff; }

        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #16161a;
            padding: 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            border: 1px solid var(--accent);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .stream-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stream-link { color: var(--accent); font-size: 0.8rem; text-decoration: none; word-break: break-all; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-dim);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <header>
        <h1>MyFlixi Dashboard</h1>
        <div id="status" class="badge" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">API Online</div>
    </header>

    <div class="search-container">
        <input type="text" id="searchQuery" placeholder="Search movies or TV shows..." value="Avatar">
        <button onclick="search()">Search</button>
    </div>

    <div class="grid" id="results">
        <!-- Results will be injected here -->
    </div>

    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="margin-bottom: 20px;">Resolution Result</h2>
            <div id="modalBody"></div>
            <button onclick="closeModal()" style="margin-top: 20px; width: 100%; padding: 15px;">Close</button>
        </div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('searchQuery').value;
            const container = document.getElementById('results');
            container.innerHTML = '<div class="loading">Hunting for media...</div>';

            try {
                // Search API
                const res = await fetch(`/api/media/search?title=${encodeURIComponent(query)}`);
                const data = await res.json();

                container.innerHTML = '';
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img class="poster" src="${item.poster}" alt="${item.title}">
                        <div class="content">
                            <div class="meta">
                                <span>${item.year || 'N/A'}</span>
                                <span class="rating">★ ${item.rating || '0.0'}</span>
                            </div>
                            <div class="title">${item.title}</div>
                            <button class="btn-resolve" onclick="resolve('${item.id}', '${item.box_type}')">
                                Resolve HLS Stream
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = `<div class="loading" style="color: #ef4444;">Error: ${e.message}</div>`;
            }
        }

        async function resolve(id, type) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            
            modalTitle.innerText = "Resolving...";
            modalBody.innerHTML = '<div class="loading">Active HLS Hunting in progress...</div>';
            modal.style.display = 'flex';

            try {
                const endpoint = type === '2' ? `/api/media/show/${id}` : `/api/media/movie/${id}`;
                const res = await fetch(endpoint);
                const data = await res.json();

                modalTitle.innerText = data.title;
                
                if (type === '2') {
                    // Show episode list
                    let html = `<p style="margin-bottom: 15px; color: var(--text-dim);">TV Show Detected. Listing first 5 episodes:</p>`;
                    const episodes = data.seasons[0].episodes.slice(0, 5);
                    
                    for (const ep of episodes) {
                        html += `
                            <div class="stream-item">
                                <div>S01E${ep.episode}: ${ep.title || 'Episode'}</div>
                                <button onclick="resolveEpisode('${ep.fid}')" style="padding: 5px 10px; font-size: 0.8rem;">Hunt HLS</button>
                            </div>
                        `;
                    }
                    modalBody.innerHTML = html;
                } else {
                    // Show movie links
                    let html = `
                        <div style="margin-bottom: 20px;">
                            <span class="badge ${data.real_stream_link ? 'badge-hls' : 'badge-missing'}">
                                ${data.real_stream_link ? 'HLS FOUND' : 'NO HLS FOUND'}
                            </span>
                        </div>
                    `;

                    if (data.real_stream_link) {
                        html += `
                            <div style="margin-bottom: 20px;">
                                <p style="color: var(--text-dim); margin-bottom: 5px;">Best HLS Source:</p>
                                <a href="${data.real_stream_link}" class="stream-link" target="_blank">${data.real_stream_link}</a>
                            </div>
                        `;
                    }

                    html += '<p style="color: var(--text-dim); margin-bottom: 10px;">All Sources:</p>';
                    data.stream_sources.forEach(src => {
                        html += `
                            <div class="stream-item">
                                <span>${src.label} (${src.quality})</span>
                                <span class="badge" style="background: ${src.is_hls ? '#10b981' : '#64748b'}">${src.is_hls ? 'HLS' : 'ORG'}</span>
                            </div>
                        `;
                    });
                    modalBody.innerHTML = html;
                }
            } catch (e) {
                modalBody.innerHTML = `<div style="color: #ef4444;">Resolution Failed: ${e.message}</div>`;
            }
        }

        async function resolveEpisode(fid) {
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = '<div class="loading">Hunting Episode HLS...</div>';

            try {
                const res = await fetch(`/api/febbox/watch/${fid}`);
                const data = await res.json();

                let html = `
                    <div style="margin-bottom: 20px;">
                        <span class="badge ${data.real_stream_link ? 'badge-hls' : 'badge-missing'}">
                            ${data.real_stream_link ? 'HLS FOUND' : 'NO HLS FOUND'}
                        </span>
                    </div>
                `;

                if (data.real_stream_link) {
                    html += `
                        <div style="margin-bottom: 20px;">
                            <p style="color: var(--text-dim); margin-bottom: 5px;">Episode Stream Link:</p>
                            <a href="${data.real_stream_link}" class="stream-link" target="_blank">${data.real_stream_link}</a>
                        </div>
                    `;
                }

                data.stream_sources.forEach(src => {
                    html += `
                        <div class="stream-item">
                            <span>${src.label}</span>
                            <span class="badge" style="background: ${src.is_hls ? '#10b981' : '#64748b'}">${src.is_hls ? 'HLS' : 'ORG'}</span>
                        </div>
                    `;
                });
                modalBody.innerHTML = html;
            } catch (e) {
                modalBody.innerHTML = `<div style="color: #ef4444;">Episode Hunting Failed: ${e.message}</div>`;
            }
        }

        function closeModal(e) {
            document.getElementById('modal').style.display = 'none';
        }

        // Initial Search
        search();
    </script>
</body>
</html>
